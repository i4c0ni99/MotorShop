 <div class="page-body">
  
    <!-- Container-fluid starts-->
    <div class="container-fluid">
        <div class="page-header">
            <div class="row">
                <div class="col-lg-6">
                    <div class="page-header-left">
                        <h3>Sottocategorie</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Container-fluid Ends-->

    <!-- Container-fluid starts-->
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-header">
                        <form class="form-inline search-form search-box">
                            <div class="form-group">
                                <input class="form-control-plaintext" type="search" placeholder="Cerca..">
                            </div>
                        </form>

                        <button type="button" class="btn btn-primary mt-md-0 mt-2" data-bs-toggle="modal"
                            data-original-title="test" data-bs-target="#exampleModal">
                            Aggiungi sottocategoria</button>
                    </div>

                    <div class="card-body">
                        <div class="table-responsive table-desi">
                            <table class="table all-package table-category " id="editableTable">
                                <thead>
                                    <tr>
                                        <th>Sottocategoria</th>
                                        <th>Categoria</th>
                                        <th>Prodotti</th>
                                        <th>Opzioni</th>
                                    </tr>
                                </thead>

                                <tbody>
                                <[foreach]>
                                    <tr>

                                        <td data-field="sottocategoria"><[sub-category]></td>

                                        <td data-field="categoria"><[category]></td>

                                        <td data-field="prodotti"><[product]></td>

                                        <td>
                                            <a href="http://localhost/MotorShop/create-subcategory.php?elimina=<[id]>">
                                                <i class="fa fa-trash" title="Elimina"></i>
                                            </a>
                                        </td>
                                        
                                    </tr>
                                    
                                <[/foreach]>
                                     
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Container-fluid Ends-->

<!-- add physical product modal box -->
<div class="modal fade" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel"
aria-hidden="true">
<div class="modal-dialog" role="document">
<div class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title f-w-600" id="exampleModalLabel">
           Aggiungi sottocategoria</h5>
        <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">×</span>
        </button>
    </div>
    <div class="modal-body">
        <form class="needs-validation" method="post" action="/MotorShop/create-subcategory.php">
            <div class="form">
                <div class="form-group">
                    <label for="validationCustom01" class="mb-1">Sottocategoria :</label>
                    <input type="text" minlength="3" class="form-control" id="validationCustom01" name="category">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" type="submit">Salva</button>
                <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Chiudi</button>
            </div>
        </form>
    </div>
    
</div>
</div>
